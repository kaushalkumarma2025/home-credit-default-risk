name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Test API import
      run: |
        cd api
        python -c "import app; print('API import OK')"

    - name: Test feature engineering import
      run: |
        cd src
        python -c "import feature_engineering; print('Feature engineering import OK')"